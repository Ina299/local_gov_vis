# 都道府県予算PDF抽出設定
#
# 各都道府県のPDF URLと抽出対象ページを定義
# pages: 款項別総括表が含まれるページ番号（1始まり）
# page_detection: auto の場合、自動でページを検出（未実装）

defaults:
  dpi: 150
  model: "Qwen/Qwen2-VL-2B-Instruct"
  fiscal_year: 2024
  unit: "千円"

prefectures:
  # 北海道
  01_hokkaido:
    name: "北海道"
    code: "01"
    pdf_url: "https://www.pref.hokkaido.lg.jp/fs/1/1/3/1/0/6/6/9/_/P57-65_%E2%97%8B%E5%8F%82%E8%80%83%E8%B3%87%E6%96%99.pdf"
    pages: [3, 4, 5]
    crop_right: true
    unit: "百万円"
    notes: "参考資料 - 歳入歳出款別内訳（右側が歳出）"

  # 東京都
  13_tokyo:
    name: "東京都"
    code: "13"
    pdf_url: "https://www.zaimu.metro.tokyo.lg.jp/syukei1/zaisei/r6/r06_yosan_gaiyo.pdf"
    pages: [10, 11, 12, 13, 14]
    notes: "款項別総括表は10-14ページ付近"

  # 神奈川県
  14_kanagawa:
    name: "神奈川県"
    code: "14"
    pdf_url: "https://www.pref.kanagawa.jp/documents/3847/00_6nendoyosanan_sankou.pdf"
    pages: [4, 5, 6, 7, 8]
    notes: "歳出予算総括表"

  # 大阪府
  27_osaka:
    name: "大阪府"
    code: "27"
    pdf_url: "https://www.pref.osaka.lg.jp/documents/13257/r06_yosansyo_ippan.pdf"
    pages: [6, 7, 8, 9, 10]
    notes: "一般会計予算書"

  # 愛知県
  23_aichi:
    name: "愛知県"
    code: "23"
    pdf_url: ""  # TODO: URL確認
    pages: []
    enabled: false

  # 福岡県
  40_fukuoka:
    name: "福岡県"
    code: "40"
    pdf_url: ""  # TODO: URL確認
    pages: []
    enabled: false

# 抽出プロンプト設定
prompts:
  budget_extraction: |
    この画像の表から歳出予算の款別データを読み取ってJSON形式で出力してください。

    抽出する項目：
    - 款番号（1, 2, 3...）
    - 款名（議会費、総務費、民生費など）
    - 本年度予算額（千円単位の数値）

    JSON形式で出力：
    ```json
    [{"款番号": "番号", "款名": "名称", "予算額": 数値}, ...]
    ```

    重要：
    - 表から実際の数値を正確に読み取ること
    - 歳入ではなく歳出のデータを抽出
    - 合計行は除外

